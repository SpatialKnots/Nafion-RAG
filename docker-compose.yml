services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nafion_rag
      POSTGRES_USER: nafion
      POSTGRES_PASSWORD: nafion
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nafion -d nafion_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  grobid:
    image: lfoppiano/grobid:0.8.0
    ports:
      - "127.0.0.1:8070:8070"

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      grobid:
        condition: service_started

  worker:
    build: .
    command: python -m app.workers.worker
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      grobid:
        condition: service_started

volumes:
  postgres_data:
